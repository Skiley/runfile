[package]
name = "runfile-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Runfile CLI — an easy-to-use, batteries-included task runner"

[[bin]]
name = "run"
path = "src/main.rs"

[dependencies]
