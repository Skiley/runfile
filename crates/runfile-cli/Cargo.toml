runfile-settings = { path = "../runfile-settings" }
runfile-crypto = { path = "../runfile-crypto" }
hex = { workspace = true }
runfile-env = { path = "../runfile-env" }
runfile-executor = { path = "../runfile-executor" }
runfile-converters = { path = "../runfile-converters" }
runfile-generators = { path = "../runfile-generators" }
runfile-mcp = { path = "../runfile-mcp" }
tokio = { workspace = true }
notify = { workspace = true }
globset = { workspace = true }
which = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
