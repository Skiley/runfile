name: Setup Runfile
description: Installs Runfile and add it to PATH
author: Skiley

inputs:
  version:
    description: 'Version to install. Defaults to latest.'
    default: latest
  secret-keys:
    description: |
      Optional newline-separated list of private encryption keys (one 64-char hex
      string per line) to register with `run :env secret-keys add` after install.

      Required when targets in your Runfile decrypt env vars from encrypted .env files.
      Pass GitHub secrets directly here — keys are stored in the runner's OS credential
      store for the duration of the job. On Linux runners, a session keyring daemon is
      bootstrapped automatically.
    default: ''
  global-files:
    description: |
      Optional newline-separated list of Runfile.json paths to register as global files
      via `run :config global-files add`. Useful for layering CI-only targets on top of
      the project's main Runfile. Paths are resolved relative to the workflow's working
      directory (typically the checkout root).
    default: ''

runs:
  using: composite
  steps:
    - name: Resolve target
      id: target
      shell: bash
      run: |
        case "$RUNNER_OS" in
          Linux)   os=unknown-linux-musl ;;
          macOS)   os=apple-darwin ;;
          Windows) os=pc-windows-msvc ;;
          *)       echo "Unsupported OS: $RUNNER_OS" >&2; exit 1 ;;
        esac

        case "$RUNNER_ARCH" in
          X64)   arch=x86_64 ;;
          ARM64) arch=aarch64 ;;
          *)     echo "Unsupported arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        if [ "$RUNNER_OS" = "Windows" ]; then ext=zip; else ext=tar.xz; fi

        echo "target=${arch}-${os}" >> "$GITHUB_OUTPUT"
        echo "ext=${ext}" >> "$GITHUB_OUTPUT"

    - name: Install runfile
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.target.outputs.target }}
        EXT: ${{ steps.target.outputs.ext }}
      run: |
        archive="runfile-cli-${TARGET}.${EXT}"

        if [ "$VERSION" = "latest" ]; then
          url="https://github.com/Skiley/runfile/releases/latest/download/${archive}"
        else
          url="https://github.com/Skiley/runfile/releases/download/${VERSION}/${archive}"
        fi

        install_dir="$RUNNER_TEMP/runfile-bin"
        mkdir -p "$install_dir"
        curl -fsSL "$url" -o "$RUNNER_TEMP/$archive"

        if [ "$EXT" = "zip" ]; then
          unzip -q "$RUNNER_TEMP/$archive" -d "$RUNNER_TEMP"
        else
          tar -xJf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
        fi

        mv "$RUNNER_TEMP/runfile-cli-${TARGET}"/run* "$install_dir/"
        echo "$install_dir" >> "$GITHUB_PATH"
        "$install_dir"/run* --version

    # Linux runners ship without a Secret Service daemon. The `keyring` crate's
    # linux-native backend talks to gnome-keyring over D-Bus, so we install both
    # and start a session bus + keyring daemon. The DBUS_SESSION_BUS_ADDRESS
    # exported here is what subsequent steps connect to. Skipped entirely when
    # no keys need registering.
    - name: Bootstrap Linux keyring
      if: inputs.secret-keys != '' && runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gnome-keyring dbus-x11

        eval "$(dbus-launch --sh-syntax)"
        eval "$(printf '\n' | gnome-keyring-daemon --start --daemonize --components=secrets)"

        echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
        if [ -n "$DBUS_SESSION_BUS_PID" ]; then
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> "$GITHUB_ENV"
        fi
        if [ -n "$GNOME_KEYRING_CONTROL" ]; then
          echo "GNOME_KEYRING_CONTROL=$GNOME_KEYRING_CONTROL" >> "$GITHUB_ENV"
        fi

    - name: Register secret keys
      if: inputs.secret-keys != ''
      shell: bash
      env:
        SECRET_KEYS: ${{ inputs.secret-keys }}
      run: |
        printf '%s\n' "$SECRET_KEYS" | while IFS= read -r line; do
          key="$(printf '%s' "$line" | tr -d '[:space:]')"
          [ -z "$key" ] && continue
          run :env secret-keys add --key "$key"
        done

    - name: Register global Runfiles
      if: inputs.global-files != ''
      shell: bash
      env:
        GLOBAL_FILES: ${{ inputs.global-files }}
      run: |
        printf '%s\n' "$GLOBAL_FILES" | while IFS= read -r line; do
          path="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          [ -z "$path" ] && continue
          run :config global-files add "$path"
        done
