name: Publish npm

# Triggered after dist's release.yml publishes a GitHub Release.
# Builds 7 npm packages (6 per-platform + 1 wrapper) using the
# optionalDependencies pattern (esbuild/biome/swc-style) and publishes
# them to npmjs.com. Zero transitive dependencies in the published
# packages, no postinstall download.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  # Required for npm publish --provenance attestation.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-artifacts
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir dist-artifacts \
            --pattern '*.tar.xz' \
            --pattern '*.zip'
          ls -la dist-artifacts

      - name: Build npm packages
        run: |
          version="${TAG#v}"
          node scripts/build-npm-packages.mjs \
            --version "$version" \
            --artifacts dist-artifacts \
            --out npm-dist
          ls -la npm-dist

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publish all platform packages first so the wrapper's
          # optionalDependencies are immediately resolvable.
          for dir in npm-dist/runfile-*; do
            echo "Publishing $(jq -r .name "$dir/package.json")"
            (cd "$dir" && npm publish --access public --provenance)
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          (cd npm-dist/runfile && npm publish --access public --provenance)
