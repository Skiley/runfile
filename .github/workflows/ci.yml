name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Setup Runfile (from source)
        uses: ./.github/actions/setup
        with:
          from-source: true
          global-files: Runfile-ci.json

      - name: Check (format + clippy + type-check)
        run: run ci:check

      - name: Verify Cargo.lock is in sync
        run: git diff --exit-code Cargo.lock

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04, windows-2025]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install pinned Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1

      - name: Setup Runfile (from source)
        uses: ./.github/actions/setup
        with:
          from-source: true
          global-files: Runfile-ci.json

      - name: Test
        run: run ci:test
