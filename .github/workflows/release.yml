name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  TAG: ${{ inputs.tag || github.ref_name }}

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, runner: ubuntu-24.04 }
          - { target: aarch64-unknown-linux-musl, runner: ubuntu-24.04-arm }
          - { target: aarch64-apple-darwin, runner: macos-latest }
          - { target: x86_64-apple-darwin, runner: macos-latest }
          - { target: x86_64-pc-windows-msvc, runner: windows-2025 }
          - { target: aarch64-pc-windows-msvc, runner: windows-2025 }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}
      - uses: ./.github/actions/setup
        with:
          from-source: true
          global-files: Runfile-ci.json
      - if: contains(matrix.target, 'linux-musl')
        run: run ci:install-musl-tools
      - run: run ci:rustup-add-target --target=${{ matrix.target }}
      - run: run ci:build-target --target=${{ matrix.target }}
      - run: run ci:package-archive --target=${{ matrix.target }}
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.target }}
          path: stage/runfile-cli-${{ matrix.target }}.*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v7
        with:
          path: assets
          pattern: build-*
          merge-multiple: true
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: ./.github/actions/setup
        with:
          from-source: true
          global-files: Runfile-ci.json
      - run: run ci:stage-release-assets
      - run: run ci:create-release --tag="$TAG"

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v7
        with:
          path: dist-artifacts
          pattern: build-*
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: ./.github/actions/setup
        with:
          from-source: true
          global-files: Runfile-ci.json
      - run: run ci:build-npm-packages --version="${TAG#v}"
      - run: run ci:publish-npm
