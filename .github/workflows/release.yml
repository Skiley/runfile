name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            archive: tar.xz
            bin: run
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive: tar.xz
            bin: run
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.xz
            bin: run
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.xz
            bin: run
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive: zip
            bin: run.exe
          - target: aarch64-pc-windows-msvc
            runner: windows-2025
            archive: zip
            bin: run.exe
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - run: rustup target add ${{ matrix.target }}
      - if: contains(matrix.target, 'linux-musl')
        run: sudo apt install -y musl-tools
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package archive
        shell: bash
        run: |
          dir="runfile-cli-${{ matrix.target }}"
          mkdir -p "stage/$dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "stage/$dir/"
          cp README.md "stage/$dir/"
          cd stage
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "$dir.zip" "$dir" > /dev/null
          else
            tar cJf "$dir.tar.xz" "$dir"
          fi
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.target }}
          path: stage/runfile-cli-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v7
        with:
          path: assets
          pattern: build-*
          merge-multiple: true
      - name: Stage release assets
        run: |
          cp scripts/install.sh assets/install.sh
          cp scripts/install.ps1 assets/install.ps1
          cp schemas/v0.schema.json assets/v0.schema.json
          cd assets && sha256sum * > sha256.sum
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            assets/*

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v7
        with:
          path: dist-artifacts
          pattern: build-*
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build npm packages
        run: |
          node scripts/build-npm-packages.mjs \
            --version "${TAG#v}" \
            --artifacts dist-artifacts \
            --out npm-dist
      - name: Publish
        run: |
          for dir in npm-dist/runfile-*; do
            (cd "$dir" && npm publish --access public --provenance)
          done
          (cd npm-dist/runfile && npm publish --access public --provenance)
